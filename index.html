<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ConvertRing</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src='//libtl.com/sdk.js' data-zone='10863560' data-sdk='show_10863560'></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9a;
    --green: #4ade80;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,106,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,106,154,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 20px rgba(124,106,255,0.4);
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 26px; font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .ad-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    text-align: center;
  }
  .counter {
    display: inline-block;
    background: rgba(124,106,255,0.15);
    border: 1px solid rgba(124,106,255,0.3);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    margin-bottom: 16px;
  }
  .ad-icon { font-size: 48px; margin-bottom: 12px; }
  .ad-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .ad-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }
  .progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width 0.4s ease; }
  .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; box-shadow: 0 4px 20px rgba(124,106,255,0.35); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn-green { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; box-shadow: 0 4px 20px rgba(34,197,94,0.3); }
  .btn-green:active { transform: scale(0.98); }
  .screen { width: 100%; display: flex; flex-direction: column; gap: 16px; }
  .hidden { display: none !important; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }
  .pulsing { animation: pulse 1.5s ease infinite; }
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">
    <div class="logo-icon">✂️</div>
    <div class="logo-text">ConvertRing</div>
  </div>

  <!-- SCREEN: Реклама 1/2 -->
  <div class="screen" id="screen1">
    <div class="ad-card">
      <div class="counter">📣 Реклама 1 з 2</div>
      <div class="progress-bar"><div class="progress-fill" style="width:0%"></div></div>
      <div class="ad-icon pulsing">🎵</div>
      <div class="ad-title">Твій рингтон готовий!</div>
      <div class="ad-sub">Зачекай секунду...</div>
    </div>
  </div>

  <!-- SCREEN: Реклама 2/2 -->
  <div class="screen hidden" id="screen2">
    <div class="ad-card">
      <div class="counter">📣 Реклама 2 з 2</div>
      <div class="progress-bar"><div class="progress-fill" style="width:50%"></div></div>
      <div class="ad-icon">⏳</div>
      <div class="ad-title">Остання реклама...</div>
      <div class="ad-sub">Зачекай секунду...</div>
    </div>
  </div>

  <!-- SCREEN: Готово -->
  <div class="screen hidden" id="screenReady">
    <div class="ad-card">
      <div class="counter" style="background:rgba(34,197,94,0.15);border-color:rgba(34,197,94,0.3);color:#22c55e;">✅ Готово!</div>
      <div class="progress-bar"><div class="progress-fill" style="width:100%"></div></div>
      <div class="ad-icon">🎵</div>
      <div class="ad-title" id="readyTitle">Дякуємо!</div>
      <div class="ad-sub" id="readySub">Натисни кнопку щоб отримати файл у чат</div>
      <button class="btn btn-green" onclick="getFile()">
        🎵 Отримати рингтон у чат
      </button>
    </div>
  </div>

  <!-- SCREEN: Error -->
  <div class="screen hidden" id="screenError">
    <div class="ad-card" style="text-align:center">
      <div style="font-size:48px;margin-bottom:12px">❌</div>
      <div class="ad-title">Помилка</div>
      <div class="ad-sub" style="margin-top:8px">Надішли відео або посилання боту щоб отримати рингтон</div>
    </div>
  </div>

</div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0a0f');
  tg.setBackgroundColor('#0a0a0f');
}

const urlParams = new URLSearchParams(location.search);
const botJobId = urlParams.get('job_id');
const lang = urlParams.get('lang') || 'uk';

const T = {
  uk: { doneTitle: 'Дякуємо!', doneSub: 'Натисни кнопку щоб отримати файл у чат' },
  ru: { doneTitle: 'Спасибо!', doneSub: 'Нажми кнопку чтобы получить файл в чат' },
  en: { doneTitle: 'Thank you!', doneSub: 'Tap the button to get the file in chat' },
}[lang] || { doneTitle: 'Дякуємо!', doneSub: 'Натисни кнопку щоб отримати файл у чат' };

function $(id) { return document.getElementById(id); }

if (!botJobId) {
  $('screen1').classList.add('hidden');
  $('screenError').classList.remove('hidden');
} else {
  $('readyTitle').textContent = T.doneTitle;
  $('readySub').textContent = T.doneSub;
  startAd1();
}

const inAppSettings = { type: 'inApp', inAppSettings: { frequency: 1, capping: 0.1, interval: 5, timeout: 3, everyPage: false } };

function tryAd() {
  // Спочатку Popup, якщо не вийде — In-app
  return show_10863560('pop').catch(() => {
    return show_10863560(inAppSettings).catch(() => {});
  });
}

function startAd1() {
  const fallback1 = setTimeout(() => {
    $('screen1').classList.add('hidden');
    $('screen2').classList.remove('hidden');
    startAd2();
  }, 10000);

  tryAd().then(() => {
    clearTimeout(fallback1);
    $('screen1').classList.add('hidden');
    $('screen2').classList.remove('hidden');
    startAd2();
  }).catch(() => {
    clearTimeout(fallback1);
    $('screen1').classList.add('hidden');
    $('screen2').classList.remove('hidden');
    startAd2();
  });
}

function startAd2() {
  const fallback2 = setTimeout(() => {
    autoSwitch();
  }, 10000);

  tryAd().then(() => {
    clearTimeout(fallback2);
    autoSwitch();
  }).catch(() => {
    clearTimeout(fallback2);
    autoSwitch();
  });
}

function autoSwitch() {
  setTimeout(() => {
    $('screen2').classList.add('hidden');
    $('screenReady').classList.remove('hidden');
  }, 4000);
}

function getFile() {
  if (tg) {
    tg.sendData(JSON.stringify({ action: 'send_file', job_id: botJobId }));
    tg.close();
  }
}
</script>
</body>
</html>
