<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ConvertRing</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent: #7c6aff;
    --accent2: #ff6a9a;
    --green: #4ade80;
    --text: #f0f0ff;
    --muted: #6b6b8a;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 20% 20%, rgba(124,106,255,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255,106,154,0.06) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  .wrap {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    box-shadow: 0 4px 20px rgba(124,106,255,0.4);
  }
  .logo-text {
    font-family: 'Syne', sans-serif;
    font-size: 26px; font-weight: 800;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  /* Ad box */
  .ad-card {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 20px;
    text-align: center;
  }
  .ad-title {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .ad-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .ad-timer {
    font-family: 'Syne', sans-serif;
    font-size: 56px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 4px;
  }
  .ad-unit {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 16px;
  }
  .ad-container {
    background: var(--surface);
    border-radius: 12px;
    min-height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
    overflow: hidden;
  }

  /* Button */
  .btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s ease;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 4px 20px rgba(124,106,255,0.35);
  }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }
  .btn-green {
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: white;
    box-shadow: 0 4px 20px rgba(34,197,94,0.3);
  }

  /* Screens */
  .screen { width: 100%; display: flex; flex-direction: column; gap: 16px; }
  .hidden { display: none !important; }

  /* Success */
  .success-icon { font-size: 64px; text-align: center; }
  .success-title {
    font-family: 'Syne', sans-serif;
    font-size: 24px; font-weight: 800;
    text-align: center;
  }
  .success-sub { font-size: 14px; color: var(--muted); text-align: center; }

  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.6} }
  .pulsing { animation: pulse 1.5s ease infinite; }
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">
    <div class="logo-icon">✂️</div>
    <div class="logo-text">ConvertRing</div>
  </div>

  <!-- SCREEN: Ad -->
  <div class="screen" id="screenAd">
    <div class="ad-card">
      <div class="ad-title">🎵 Твій рингтон готовий!</div>
      <div class="ad-sub">Перегляньте рекламу щоб отримати файл</div>
      <div class="ad-timer pulsing" id="adTimer">15</div>
      <div class="ad-unit">секунд</div>
      <div class="ad-container" id="adContainer">
        <span>📣 Реклама завантажується…</span>
      </div>
      <button class="btn btn-primary" id="getBtn" disabled onclick="getFile()">
        Зачекайте…
      </button>
    </div>
  </div>

  <!-- SCREEN: Error (no job_id) -->
  <div class="screen hidden" id="screenError">
    <div class="ad-card" style="text-align:center">
      <div style="font-size:48px;margin-bottom:12px">❌</div>
      <div class="ad-title">Помилка</div>
      <div class="ad-sub" style="margin-top:8px">Надішли відео або посилання боту щоб отримати рингтон</div>
    </div>
  </div>

</div>

<script>
const MONETAG_ZONE = 'YOUR_MONETAG_ZONE_ID';
const AD_SECONDS = 15;

const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0a0a0f');
  tg.setBackgroundColor('#0a0a0f');
}

const urlParams = new URLSearchParams(location.search);
const botJobId = urlParams.get('job_id');
const lang = urlParams.get('lang') || 'uk';

// Тексти
const T = {
  uk: { wait: 'Зачекайте…', get: '🎵 Отримати рингтон у чат', ready: 'Твій рингтон готовий!', sub: 'Перегляньте рекламу щоб отримати файл', adLoad: '📣 Реклама завантажується…', unit: 'секунд' },
  ru: { wait: 'Подождите…', get: '🎵 Получить рингтон в чат', ready: 'Твой рингтон готов!', sub: 'Посмотрите рекламу чтобы получить файл', adLoad: '📣 Загрузка рекламы…', unit: 'секунд' },
  en: { wait: 'Please wait…', get: '🎵 Get ringtone in chat', ready: 'Your ringtone is ready!', sub: 'Watch an ad to get your file', adLoad: '📣 Loading ad…', unit: 'seconds' },
}[lang] || {
  wait: 'Зачекайте…', get: '🎵 Отримати рингтон у чат', ready: 'Твій рингтон готовий!', sub: 'Перегляньте рекламу щоб отримати файл', adLoad: '📣 Реклама завантажується…', unit: 'секунд'
};

function $(id) { return document.getElementById(id); }

if (!botJobId) {
  $('screenAd').classList.add('hidden');
  $('screenError').classList.remove('hidden');
} else {
  // Застосовуємо тексти
  document.querySelector('.ad-title').textContent = '🎵 ' + T.ready;
  document.querySelector('.ad-sub').textContent = T.sub;
  document.querySelector('.ad-unit').textContent = T.unit;
  $('getBtn').textContent = T.wait;
  $('adContainer').innerHTML = `<span>${T.adLoad}</span>`;

  // Запускаємо рекламу і таймер
  loadAd();
  startTimer();
}

function loadAd() {
  const container = $('adContainer');
  container.innerHTML = '';
  const script = document.createElement('script');
  script.setAttribute('data-cfasync', 'false');
  script.src = `//ophoacit.com/1?z=${MONETAG_ZONE}`;
  script.async = true;
  container.appendChild(script);
  setTimeout(() => {
    if (container.children.length <= 1) {
      container.innerHTML = '<div style="padding:20px;color:#6b6b8a;font-size:13px">📣 Реклама завантажується…</div>';
    }
  }, 3000);
}

function startTimer() {
  let left = AD_SECONDS;
  $('adTimer').textContent = left;
  const interval = setInterval(() => {
    left--;
    $('adTimer').textContent = left;
    if (left <= 0) {
      clearInterval(interval);
      $('adTimer').classList.remove('pulsing');
      $('adTimer').textContent = '✅';
      $('getBtn').disabled = false;
      $('getBtn').textContent = T.get;
      $('getBtn').className = 'btn btn-green';
    }
  }, 1000);
}

function getFile() {
  if (tg) {
    tg.sendData(JSON.stringify({ action: 'send_file', job_id: botJobId }));
    tg.close();
  }
}
</script>
</body>
</html>
